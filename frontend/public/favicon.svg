<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Blue gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <!-- Subtle top-down shine for depth -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity=".15"/>
      <stop offset=".5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Bar 1 — short -->
  <rect x="13" y="39" width="10" height="13" rx="2" fill="#fff"/>
  <!-- Bar 2 — medium -->
  <rect x="27" y="27" width="10" height="25" rx="2" fill="#fff"/>
  <!-- Bar 3 — tall -->
  <rect x="41" y="14" width="10" height="38" rx="2" fill="#fff"/>
</svg>
